{% extends 'base.html' %}
{% block title %}{{ 'Edit' if product else 'New' }} product · CloudCart{% endblock %}
{% block content %}
<div class="glass-panel p-4 p-lg-5">
  <h1 class="section-title mb-4">{{ 'Edit product' if product else 'Add product' }}</h1>
  <form method="post" class="row g-3">
    <div class="col-md-6"><label class="form-label">Name</label><input name="name" class="form-control" required value="{{ product.name if product else '' }}"></div>
    <div class="col-md-6"><label class="form-label">Slug</label><input name="slug" class="form-control" required value="{{ product.slug if product else '' }}"></div>
    <div class="col-md-4"><label class="form-label">Category</label><input name="category" class="form-control" required value="{{ product.category if product else '' }}"></div>
    <div class="col-md-4"><label class="form-label">Price</label><input type="number" step="0.01" name="price" class="form-control" required value="{{ product.price if product else '' }}"></div>
    <div class="col-md-4"><label class="form-label">Stock</label><input type="number" name="stock" class="form-control" required value="{{ product.stock if product else '' }}"></div>
    <div class="col-12"><label class="form-label">Image URL</label><input name="image" class="form-control" required value="{{ product.image if product else '' }}"></div>
    <div class="col-12"><label class="form-label">Short description</label><input name="short_description" class="form-control" required value="{{ product.short_description if product else '' }}"></div>
    <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="5" required>{{ product.description if product else '' }}</textarea></div>
    <div class="col-12 form-check ms-1">
      <input class="form-check-input" type="checkbox" name="featured" {% if product and product.featured %}checked{% endif %}>
      <label class="form-check-label">Featured product</label>
    </div>
    <div class="col-12"><button class="btn btn-info text-dark fw-semibold">Save product</button></div>
  </form>
</div>
{% endblock %}
