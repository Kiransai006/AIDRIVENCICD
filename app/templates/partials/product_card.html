<div class="card product-card h-100 border-0 shadow-sm">
  <img src="{{ product.image }}" class="card-img-top product-image" alt="{{ product.name }}">
  <div class="card-body d-flex flex-column">
    <span class="badge text-bg-dark-subtle mb-2 w-fit">{{ product.category }}</span>
    <h5 class="card-title">{{ product.name }}</h5>
    <p class="card-text text-secondary">{{ product.short_description }}</p>
    <div class="mt-auto d-flex justify-content-between align-items-center">
      <strong class="fs-5">€{{ '%.2f'|format(product.price) }}</strong>
      <a class="btn btn-primary" href="{{ url_for('product_detail', slug=product.slug) }}">View</a>
    </div>
  </div>
</div>
