{% extends 'base.html' %}
{% block title %}Login · CloudCart{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="glass-panel p-4 p-lg-5 auth-card">
    <h1 class="section-title mb-4">Login</h1>
    <form method="post" class="row g-3">
      <div class="col-12"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required></div>
      <div class="col-12"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
      <div class="col-12 d-grid"><button class="btn btn-info text-dark fw-semibold">Login</button></div>
    </form>
  </div>
</div>
{% endblock %}
